{% block ripper %}
    <div class="tab-pane active pt-4" id="home" role="tabpanel" aria-labelledby="home-tab">
        <style>
            /* Light theme (default). All surfaces/text/borders go through vars so
               the [data-theme="dark"] block below can retint the whole overview
               and keep text/background contrast (dark-mode.css flips base text to
               light, which would otherwise sit on these light surfaces). */
            .ars-overview {
                --ars-ripping:#2563eb; --ars-idle:#6b7280; --ars-open:#b45309; --ars-unavailable:#868d97;
                --ars-border:#e2e5ea; --ars-muted:#6b7280; --ars-text:#212529; --ars-bad:#dc2626;
                --ars-surface:#ffffff; --ars-surface-2:#f6f7f9; --ars-surface-3:#fbfcfd;
                --ars-track:#eef1f5; --ars-herobar:#0f172a; --ars-shadow:rgba(0,0,0,.08);
                color:var(--ars-text);
            }
            [data-theme="dark"] .ars-overview {
                --ars-ripping:#5b9bff; --ars-idle:#9aa1a8; --ars-open:#e0a24a; --ars-unavailable:#7a8288;
                --ars-border:#3a3f44; --ars-muted:#9aa1a8; --ars-text:#e0e0e0; --ars-bad:#f87171;
                --ars-surface:#2a2d33; --ars-surface-2:#33393e; --ars-surface-3:#2e3236;
                --ars-track:#1f2226; --ars-herobar:#1f2226; --ars-shadow:rgba(0,0,0,.5);
            }

            /* stats strip */
            .ars-stats { display:flex; flex-wrap:wrap; gap:.5rem; margin-bottom:1rem; }
            .ars-stat { flex:0 0 auto; min-width:88px; padding:.5rem .8rem; border:1px solid var(--ars-border);
                border-radius:.5rem; background:var(--ars-surface); color:var(--ars-text); }
            .ars-stat-grow { flex:1 1 200px; }
            .ars-stat-label { font-size:.68rem; text-transform:uppercase; letter-spacing:.04em; color:var(--ars-muted); }
            .ars-stat-value { font-size:1.25rem; font-weight:600; line-height:1.3; }
            .ars-stat-value.ars-stat-sm { font-size:.85rem; font-weight:500; }
            .ars-stat-bad { color:var(--ars-bad); }
            .ars-pill { display:inline-block; font-size:.62rem; font-weight:700; text-transform:uppercase;
                padding:.05rem .4rem; border-radius:1rem; vertical-align:middle; text-decoration:none; }
            .ars-pill-warn { background:#fef3c7; color:#92400e; }
            [data-theme="dark"] .ars-pill-warn { background:#8b6b3a; color:#fff; }

            /* now-ripping hero */
            .ars-hero { border:1px solid var(--ars-border); border-radius:.6rem; overflow:hidden;
                margin-bottom:1rem; background:var(--ars-surface); color:var(--ars-text); }
            .ars-hero-bar { background:var(--ars-herobar); color:#fff; font-weight:600; padding:.5rem .9rem; }
            .ars-hero-body { padding:.75rem .9rem; }
            .ars-hero-empty { color:var(--ars-muted); font-style:italic; padding:.4rem 0; }
            .ars-hero-row { padding:.4rem 0; }
            .ars-hero-row + .ars-hero-row { border-top:1px solid var(--ars-border); }
            .ars-hero-head { display:flex; flex-wrap:wrap; align-items:baseline; gap:.4rem; }
            .ars-hero-dev { font-family:monospace; font-size:.78rem; color:var(--ars-muted); }
            .ars-hero-name { font-weight:600; }
            .ars-hero-meta { font-size:.8rem; color:var(--ars-muted); text-transform:capitalize; }
            .ars-hero-progress { height:.5rem; background:var(--ars-track); border-radius:1rem; overflow:hidden; margin:.35rem 0 .2rem; }
            .ars-hero-fill { height:100%; background:var(--ars-ripping); transition:width .6s ease; }
            .ars-hero-sub { font-size:.78rem; color:var(--ars-muted); }

            /* drive chips */
            .ars-drives { border:1px solid var(--ars-border); border-radius:.6rem; overflow:hidden;
                background:var(--ars-surface); color:var(--ars-text); }
            .ars-drives-bar { display:flex; justify-content:space-between; align-items:center;
                background:var(--ars-surface-2); color:var(--ars-text); padding:.5rem .9rem; font-weight:600; }
            .ars-scan { font-size:.82rem; font-weight:500; }
            .ars-chip-row { display:flex; flex-wrap:wrap; gap:.6rem; padding:.9rem; }
            .ars-chip { flex:1 1 180px; max-width:260px; text-align:left; background:var(--ars-surface);
                color:var(--ars-text); cursor:pointer; border:1px solid var(--ars-border);
                border-left:4px solid var(--ars-idle); border-radius:.5rem; padding:.55rem .7rem; }
            .ars-chip:hover { box-shadow:0 1px 6px var(--ars-shadow); }
            .ars-chip-top { display:flex; align-items:center; gap:.4rem; }
            .ars-chip-dot { width:.6rem; height:.6rem; border-radius:50%; background:var(--ars-idle); flex:0 0 auto; }
            .ars-chip-name { font-weight:600; flex:1 1 auto; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
            .ars-chip-state { font-size:.7rem; font-weight:700; text-transform:uppercase; }
            .ars-chip-sub { display:block; font-size:.75rem; color:var(--ars-muted); margin-top:.15rem; text-transform:capitalize; }
            .ars-chip-ripping { border-left-color:var(--ars-ripping); }
            .ars-chip-ripping .ars-chip-dot { background:var(--ars-ripping); }
            .ars-chip-ripping .ars-chip-state { color:var(--ars-ripping); }
            .ars-chip-open { border-left-color:var(--ars-open); }
            .ars-chip-open .ars-chip-dot { background:var(--ars-open); }
            .ars-chip-open .ars-chip-state { color:var(--ars-open); }
            .ars-chip-unavailable { border-left-color:var(--ars-unavailable); border-left-style:dashed; }
            .ars-chip-unavailable .ars-chip-dot { background:var(--ars-unavailable); }
            .ars-chip-unavailable .ars-chip-state { color:var(--ars-muted); }
            .ars-chip-idle .ars-chip-state { color:var(--ars-idle); }

            /* expanded detail */
            .ars-detail { margin:0 .9rem .9rem; border:1px solid var(--ars-border); border-radius:.5rem;
                padding:.8rem; background:var(--ars-surface-3); color:var(--ars-text); }
            .ars-detail-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:.35rem .9rem; margin-bottom:.7rem; }
            .ars-kv { display:flex; gap:.5rem; font-size:.85rem; }
            .ars-kv > span { flex:0 0 5.5rem; color:var(--ars-muted); }
            .ars-detail-form { display:flex; flex-wrap:wrap; gap:.6rem; margin-bottom:.7rem; }
            .ars-detail-form label { flex:1 1 180px; font-size:.8rem; font-weight:600; margin:0; }
            .ars-detail-actions { display:flex; flex-wrap:wrap; gap:.4rem; }
            .ars-empty { padding:.9rem; color:var(--ars-muted); }
        </style>

        <div class="ars-overview">
            {% include 'settings/_overview_stats.html' %}
            {% include 'settings/_overview_hero.html' %}
            {% include 'settings/_overview_drives.html' %}
        </div>

        <script src="{{ url_for('static', filename='js/overviewRefresh.js') }}"></script>
    </div>
{% endblock %}
